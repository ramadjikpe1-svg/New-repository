backend:
  name: git-gateway
  branch: main

media_folder: "src/images"
public_folder: "/images"

collections:

  - name: "accueil"
    label: "Page d'accueil"
    files:

      - label: "Bannière principale"
        name: "hero"
        file: "src/_data/hero.json"
        fields:
          - { label: "Petite accroche", name: "tag", widget: "string" }
          - { label: "Titre principal", name: "titre", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Image de fond", name: "image", widget: "image" }

      - label: "Phrase d'accroche"
        name: "accroche"
        file: "src/_data/accroche.json"
        fields:
          - { label: "Texte", name: "texte", widget: "string" }

      - label: "Presentation de l'office"
        name: "presentation"
        file: "src/_data/presentation.json"
        fields:
          - { label: "Paragraphe 1", name: "para1", widget: "text" }
          - { label: "Paragraphe 2", name: "para2", widget: "text" }
          - { label: "Paragraphe 3", name: "para3", widget: "text" }
          - { label: "Paragraphe 4", name: "para4", widget: "text" }
          - { label: "Signature", name: "signature", widget: "string" }
          - label: "Statistiques"
            name: "stats"
            widget: "list"
            fields:
              - { label: "Chiffre", name: "nombre", widget: "string" }
              - { label: "Label", name: "label", widget: "string" }

  - name: "temoignages"
    label: "Temoignages"
    files:
      - label: "Liste des temoignages"
        name: "temoignages"
        file: "src/_data/temoignages.json"
        widget: "list"
        fields:
          - { label: "Citation", name: "citation", widget: "text" }
          - { label: "Auteur", name: "auteur", widget: "string" }

  - name: "services"
    label: "Services"
    files:
      - label: "Liste des services"
        name: "services"
        file: "src/_data/services.json"
        widget: "list"
        fields:
          - { label: "Numero", name: "numero", widget: "string" }
          - { label: "Nom", name: "nom", widget: "string" }
          - { label: "Description", name: "desc", widget: "text" }
          - { label: "Lien", name: "lien", widget: "string" }

  - name: "contact"
    label: "Coordonnees"
    files:
      - label: "Informations de contact"
        name: "contact"
        file: "src/_data/contact.json"
        fields:
          - { label: "Adresse ligne 1", name: "adresse1", widget: "string" }
          - { label: "Adresse ligne 2", name: "adresse2", widget: "string" }
          - { label: "Adresse ligne 3", name: "adresse3", widget: "string" }
          - { label: "Email Marion", name: "email_marion", widget: "string" }
          - { label: "Email Frank", name: "email_frank", widget: "string" }
          - { label: "LinkedIn Marion", name: "linkedin_marion", widget: "string" }
          - { label: "LinkedIn Frank", name: "linkedin_frank", widget: "string" }
          - { label: "Facebook Marion", name: "facebook_marion", widget: "string" }
          - { label: "Lien paiement", name: "paiement_url", widget: "string" }
